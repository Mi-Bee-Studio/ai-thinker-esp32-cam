<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI-Thinker CAM 仪表盘</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--c:#0D9488;--cd:#0F766E;--bg:#F8FAFB;--card:#fff;--t:#1E293B;--t2:#64748B;--bdr:#E2E8F0;--red:#DC2626;--yel:#D97706;--grn:#059669}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;background:var(--bg);color:var(--t);font-size:14px}
.hdr{background:linear-gradient(135deg,#0F766E,#0D9488);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px}
.hdr h1{font-size:17px;font-weight:700;letter-spacing:.3px}
.hdr .sub{font-size:12px;opacity:.75;margin-left:auto}
.nav{background:var(--card);border-bottom:1px solid var(--bdr);display:flex}
.nav a{flex:1;text-align:center;padding:10px 0;font-size:13px;color:var(--t2);text-decoration:none;border-bottom:2px solid transparent;transition:all .15s}
.nav a.act{color:var(--c);border-bottom-color:var(--c);font-weight:600}
.nav a:hover{background:#F1F5F9}
.main{padding:12px;max-width:600px;margin:0 auto;padding-bottom:20px}
.card{background:var(--card);border-radius:10px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ct{font-size:13px;color:var(--t2);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:480px){.grid{grid-template-columns:1fr 1fr}}
.row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid #F1F5F9}
.row:last-child{border-bottom:none}
.row .l{color:var(--t2)}
.row .v{font-weight:500;color:var(--t);text-align:right;max-width:60%;word-break:break-all}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.dot.g{background:var(--grn)}
.dot.y{background:var(--yel)}
.dot.r{background:var(--red)}
.dot.pulse{animation:pls 1s infinite}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.3}}
.bar-w{background:#E2E8F0;border-radius:4px;height:8px;margin:6px 0;overflow:hidden}
.bar-f{height:100%;border-radius:4px;transition:width .5s}
.bar-f.g{background:var(--c)}
.bar-f.y{background:var(--yel)}
.bar-f.r{background:var(--red)}
.bar-t{font-size:12px;color:var(--t2)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge.g{background:#ECFDF5;color:var(--grn)}
.badge.y{background:#FFFBEB;color:var(--yel)}
.badge.r{background:#FEF2F2;color:var(--red)}
</style>
</head>
<body>
<div class="hdr">
<h1>AI-Thinker CAM</h1>
<span class="sub" id="devName">--</span>
</div>
<div class="nav">
<a href="/" class="act">仪表盘</a>
<a href="/preview.html">实时预览</a>
<a href="/config.html">配置</a>
<a href="/files.html">照片</a>
</div>
<div class="main">

<div class="card">
<div class="ct">设备状态</div>
<div class="row"><span class="l">设备名称</span><span class="v" id="dName">--</span></div>
<div class="row"><span class="l">运行时间</span><span class="v" id="dUp">--</span></div>
<div class="row"><span class="l">固件版本</span><span class="v" id="dVer">--</span></div>
</div>

<div class="card">
<div class="ct">摄像头</div>
<div class="row"><span class="l">状态</span><span class="v" id="cSt">--</span></div>
<div class="row"><span class="l">传感器</span><span class="v" id="cSen">--</span></div>
<div class="row"><span class="l">分辨率</span><span class="v" id="cRes">--</span></div>
</div>

<div class="grid">
<div class="card">
<div class="ct">WiFi</div>
<div class="row"><span class="l">模式</span><span class="v" id="wMode">--</span></div>
<div class="row"><span class="l">IP地址</span><span class="v" id="wIp">--</span></div>
<div class="row"><span class="l">信号强度</span><span class="v" id="wRssi">--</span></div>
</div>
<div class="card">
<div class="ct">存储</div>
<div class="bar-w"><div class="bar-f g" id="sBar" style="width:0%"></div></div>
<div class="bar-t" id="sTxt">--</div>
<div class="row" style="margin-top:6px"><span class="l">照片数量</span><span class="v" id="sCnt">--</span></div>
</div>
</div>

<div class="grid">
<div class="card">
<div class="ct">移动侦测</div>
<div class="row"><span class="l">状态</span><span class="v" id="mEn">--</span></div>
<div class="row"><span class="l">事件次数</span><span class="v" id="mEvt">--</span></div>
</div>
<div class="card">
<div class="ct">系统内存</div>
<div class="row"><span class="l">可用堆</span><span class="v" id="hFree">--</span></div>
<div class="row"><span class="l">最低堆</span><span class="v" id="hMin">--</span></div>
</div>
</div>

</div>
<script>
function $(s){return document.getElementById(s)}
function fmtT(s){var h=Math.floor(s/3600),m=Math.floor(s%3600/60);if(h>0)return h+'小时'+m+'分钟';return m+'分钟'}
function fmtB(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB'}
function dot(c,pls){return '<span class="dot '+c+(pls?' pulse':'')+'"></span>'}
function badge(c,t){return '<span class="badge '+c+'">'+t+'</span>'}
function rssiInfo(v){if(v==null)return '--';if(v>-50)return dot('g')+' '+v+'dBm 极好';if(v>-70)return dot('g')+' '+v+'dBm 良好';if(v>-80)return dot('y')+' '+v+'dBm 一般';return dot('r')+' '+v+'dBm 较差'}

function refresh(){
fetch('/api/status').then(function(r){return r.json()}).then(function(d){
if(!d||!d.ok)return;var v=d.data;
$('dName').textContent=v.device_name||'AI-Thinker CAM';
$('devName').textContent=v.device_name||'';
$('dUp').textContent=v.uptime!=null?fmtT(v.uptime):'--';
$('dVer').textContent=v.firmware_version||'v1.0';

var cOk=v.camera_ok||v.camera;
$('cSt').innerHTML=cOk?badge('g','已初始化'):badge('r','未初始化');
$('cSen').textContent=v.sensor||'OV2640';
$('cRes').textContent=v.resolution||'--';

$('wMode').textContent=v.wifi_mode||'--';
$('wIp').textContent=v.ip||'--';
$('wRssi').innerHTML=rssiInfo(v.wifi_rssi);

if(v.spiffs_total!=null&&v.spiffs_free!=null){
var used=v.spiffs_total-v.spiffs_free;
var pct=Math.round(used*100/v.spiffs_total);
$('sBar').style.width=pct+'%';
$('sBar').className='bar-f '+(pct>90?'r':pct>70?'y':'g');
$('sTxt').textContent='已用 '+fmtB(used)+' / '+fmtB(v.spiffs_total)+' ('+pct+'%)';
}else{$('sBar').style.width='0%';$('sTxt').textContent='--';}
$('sCnt').textContent=(v.photo_count!=null?v.photo_count:'--')+' 张';

var men=v.motion_enabled;
$('mEn').innerHTML=men?badge('g','已启用'):badge('y','未启用');
$('mEvt').textContent=(v.motion_events!=null?v.motion_events:'--')+' 次';

$('hFree').textContent=v.free_heap!=null?fmtB(v.free_heap):'--';
$('hMin').textContent=v.min_heap!=null?fmtB(v.min_heap):'--';
}).catch(function(e){console.error('Status fetch failed:',e)});
}
setInterval(refresh,5000);
window.onload=refresh;
</script>
</body>
</html>
