<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mi&amp;Bee CAM 文件管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--c:#0D9488;--cd:#0F766E;--bg:#F8FAFB;--card:#fff;--t:#1E293B;--t2:#64748B;--bdr:#E2E8F0}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;background:var(--bg);color:var(--t);font-size:14px}
.hdr{background:linear-gradient(135deg,#0F766E,#0D9488);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px}
.hdr h1{font-size:17px;font-weight:700}
.hdr .sub{font-size:12px;opacity:.75;margin-left:auto}
.nav{background:var(--card);border-bottom:1px solid var(--bdr);display:flex}
.nav a{flex:1;text-align:center;padding:10px 0;font-size:13px;color:var(--t2);text-decoration:none;border-bottom:2px solid transparent;transition:all .15s}
.nav a.act{color:var(--c);border-bottom-color:var(--c);font-weight:600}
.nav a:hover{background:#F1F5F9}
.main{padding:12px;max-width:600px;margin:0 auto;padding-bottom:20px}
.card{background:var(--card);border-radius:10px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
/* Storage bar */
.bar-w{height:10px;background:#E2E8F0;border-radius:5px;overflow:hidden}
.bar-f{height:100%;border-radius:5px;transition:width .4s}
.bar-f.g{background:linear-gradient(90deg,#10B981,#34D399)}
.bar-f.y{background:linear-gradient(90deg,#F59E0B,#FBBF24)}
.bar-f.r{background:linear-gradient(90deg,#EF4444,#F87171)}
.bar-t{font-size:12px;color:var(--t2);margin-top:6px}
.bar-detail{display:flex;justify-content:space-between;margin-top:4px;font-size:11px;color:var(--t2)}
/* Tabs */
.tabs{display:flex;background:var(--card);border-radius:8px;padding:3px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;border-radius:6px;transition:all .15s}
.tab.active{background:var(--c);color:#fff}
.tab:hover:not(.active){background:#F1F5F9}
/* Toolbar */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.toolbar .left{display:flex;align-items:center;gap:8px}
.btn{padding:6px 14px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-d{background:#DC2626;color:#fff}
.btn-d:hover{background:#B91C1C}
.btn-s{background:var(--card);color:var(--t);border:1px solid var(--bdr)}
.btn-s:hover{background:#F1F5F9}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* File list */
.list-view{display:flex;flex-direction:column}
.file-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F1F5F9}
.file-item:last-child{border-bottom:none}
.file-info{flex:1;min-width:0}
.file-name{font-size:13px;word-break:break-all;color:var(--t)}
.file-meta{font-size:11px;color:var(--t2);margin-top:2px;display:flex;gap:8px}
.file-type{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600}
.file-type.photo{background:#ECFDF5;color:#059669}
.file-type.recording{background:#FEF2F2;color:#DC2626}
.file-actions{display:flex;gap:6px;flex-shrink:0;margin-left:8px}
.btn-sm{padding:4px 10px;border:none;border-radius:4px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;transition:background .15s}
.btn-dl{background:var(--c);color:#fff}
.btn-dl:hover{background:var(--cd)}
.btn-del{background:#DC2626;color:#fff}
.btn-del:hover{background:#B91C1C}
/* Pager */
.pager{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px}
.pager .pi{font-size:13px;color:var(--t2);min-width:80px;text-align:center}
.pager .btn{padding:6px 12px;font-size:13px}
.empty{text-align:center;padding:40px 20px;color:var(--t2);font-size:14px}
.empty .icon{font-size:40px;margin-bottom:12px;opacity:.4}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:8px;font-size:14px;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none;font-weight:500}
.toast.show{opacity:1}
.toast.ok{background:var(--c);color:#fff}
.toast.err{background:#DC2626;color:#fff}
</style>
</head>
<body>
<div class="hdr">
<h1>Mi&amp;Bee CAM</h1>
<span class="sub">文件管理</span>
</div>
<div class="nav">
<a href="/">仪表盘</a>
<a href="/preview.html">实时预览</a>
<a href="/files.html" class="act">文件</a>
<a href="/config.html">设置</a>
</div>
<div class="main">

<div class="card">
<div class="bar-w"><div class="bar-f g" id="sBar" style="width:0%"></div></div>
<div class="bar-t" id="sTxt">--</div>
<div class="bar-detail"><span id="sUsed">--</span><span id="sFree">--</span></div>
</div>

<div class="tabs">
<div class="tab active" data-type="all" onclick="switchTab('all')">全部</div>
<div class="tab" data-type="photos" onclick="switchTab('photos')">照片</div>
<div class="tab" data-type="recordings" onclick="switchTab('recordings')">录像</div>
</div>

<div class="toolbar">
<div class="left">
<span style="font-size:13px;color:var(--t2)" id="fSummary">加载中...</span>
<select id="pageSize" class="btn btn-s" style="padding:5px 8px;font-size:12px;font-weight:500" onchange="changePageSize()">
<option value="10" selected>10条/页</option>
<option value="20">20条/页</option>
<option value="50">50条/页</option>
</select>
<button class="btn btn-s" onclick="goPage(curPage)">刷新</button>
</div>
</div>

<div id="fileList"></div>
<div id="pagerBox" class="pager" style="display:none">
<button class="btn btn-s" id="btnPrev" onclick="goPage(curPage-1)">上一页</button>
<span class="pi" id="pageInfo">-</span>
<button class="btn btn-s" id="btnNext" onclick="goPage(curPage+1)">下一页</button>
</div>
<div class="toast" id="toast"></div>
<script>
function $(s){return document.getElementById(s)}
var tT=null;
function showToast(m,e){var t=$('toast');t.textContent=m;t.className='toast show '+(e?'err':'ok');clearTimeout(tT);tT=setTimeout(function(){t.className='toast'},3000)}
function getPw(){return localStorage.getItem('cam_password')||''}
function setPw(p){localStorage.setItem('cam_password',p)}
function authH(){var p=getPw();return p?{'X-Password':p}:{}}
function authFetch(u,o){o=o||{};o.headers=Object.assign({},o.headers||{},authH());return fetchWithTimeout(u,o).then(function(r){if(r.status===401){setPw('');loginDialog();throw new Error('Unauthorized')}return r})}
function loginDialog(cb){var p=prompt('请输入管理密码:');if(!p)return;fetch('/api/status',{headers:{'X-Password':p}}).then(function(r){if(r.ok){setPw(p);if(cb)cb()}else{alert('密码错误');loginDialog(cb)}})}
function requireAuth(cb){if(getPw())cb();else loginDialog(cb)}
function fmtB(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';if(b<1073741824)return(b/1048576).toFixed(1)+'MB';return(b/1073741824).toFixed(2)+'GB'}
var fetchWithTimeout=function(url,opts,ms){
  opts=opts||{};ms=ms||8000;
  var ctrl=new AbortController();
  var to=setTimeout(function(){ctrl.abort()},ms);
  opts.signal=ctrl.signal;
  return fetch(url,opts).then(function(r){clearTimeout(to);return r},function(e){clearTimeout(to);throw e});
};

var curFiles=[];
var curPage=1;
var totalCount=0;
var PAGE_SIZE=10;
var sdFreeMb=0;
var SD_TOTAL_MB=0;
var curType='all';

function switchTab(type){
  curType=type;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.type===type)});
  curPage=1;
  goPage(1);
}

function updateStorage(){
if(sdFreeMb<=0){
if(SD_TOTAL_MB>0){
$('sBar').style.width='0%';
$('sTxt').textContent=fmtB(SD_TOTAL_MB*1048576)+' (容量)';
$('sUsed').textContent='--';
$('sFree').textContent='--';
}else{
$('sBar').style.width='0%';$('sTxt').textContent='--';
}
return;
}
var totalMb=SD_TOTAL_MB||32000;
var usedMb=totalMb-sdFreeMb;
var pct=Math.round(usedMb*100/totalMb);
if(pct<0)pct=0;if(pct>100)pct=100;
$('sBar').style.width=pct+'%';
$('sBar').className='bar-f '+(pct>90?'r':pct>70?'y':'g');
$('sTxt').textContent='已用 '+fmtB(usedMb*1048576)+' / '+fmtB(totalMb*1048576)+' ('+pct+'%)';
$('sUsed').textContent='已用 '+fmtB(usedMb*1048576);
$('sFree').textContent='可用 '+fmtB(sdFreeMb*1048576);
}

function renderFiles(){
if(!curFiles.length){
var msg=curType==='recordings'?'暂无录像':'暂无照片';
var hint=curType==='recordings'?'通过预览页录像或开启延时拍摄来录制':'通过预览页拍照或开启移动侦测来自动保存';
$('fileList').innerHTML='<div class="empty"><div class="icon">&#128193;</div>'+msg+'<br><span style="font-size:12px">'+hint+'</span></div>';
$('pagerBox').style.display='none';
return;
}
var h='<div class="list-view">';
for(var i=0;i<curFiles.length;i++){
var f=curFiles[i];
var disp=f.name.split('/').pop();
var typeClass=f.type==='recording'?'recording':'photo';
var typeLabel=f.type==='recording'?'录像':'照片';
h+='<div class="file-item">';
h+='<div class="file-info"><div class="file-name">'+disp+'</div>';
h+='<div class="file-meta"><span class="file-type '+typeClass+'">'+typeLabel+'</span><span>'+fmtB(f.size)+'</span>';
if(f.time)h+='<span>'+f.time+'</span>';
h+='</div></div>';
h+='<div class="file-actions">';
h+='<button class="btn-sm btn-dl" onclick="dlFile(\''+f.name.replace(/'/g,"\\'")+'\',\''+f.type+'\')">下载</button>';
h+='<button class="btn-sm btn-del" onclick="delFile(\''+f.name.replace(/'/g,"\\'")+'\',\''+f.type+'\')">删除</button>';
h+='</div></div>';
}
h+='</div>';
$('fileList').innerHTML=h;
}

function updatePager(){
var pages=Math.ceil(totalCount/PAGE_SIZE)||1;
$('pageInfo').textContent=curPage+' / '+pages;
$('btnPrev').disabled=(curPage<=1);
$('btnNext').disabled=(curPage>=pages);
$('pagerBox').style.display=totalCount>0?'flex':'none';
}

function changePageSize(){
PAGE_SIZE=parseInt($('pageSize').value)||10;
curPage=1;
goPage(1);
}

function goPage(p){
var pages=Math.ceil(totalCount/PAGE_SIZE)||1;
if(p<1)p=1;if(p>pages)p=pages;
curPage=p;
var offset=(p-1)*PAGE_SIZE;
$('fSummary').textContent='加载中...';
var btnP=$('btnPrev'),btnN=$('btnNext');
if(btnP)btnP.disabled=true;if(btnN)btnN.disabled=true;
fetchWithTimeout('/api/files?type='+curType+'&offset='+offset+'&limit='+PAGE_SIZE,{},5000).then(function(r){return r.json()}).then(function(d){
if(!d||!d.ok){$('fSummary').textContent='加载失败';updatePager();return}
var v=d.data;
sdFreeMb=v.sd_free_mb||0;
if(v.sd_total_mb)SD_TOTAL_MB=v.sd_total_mb;
totalCount=v.total||0;
curFiles=v.files||[];
curFiles.sort(function(a,b){return b.name.localeCompare(a.name)});
var label=curType==='recordings'?'录像':curType==='photos'?'照片':'文件';
$('fSummary').textContent='共 '+totalCount+' 个'+label;
updateStorage();
renderFiles();
updatePager();
}).catch(function(e){
$('fSummary').textContent='加载失败';console.error(e);
}).finally(function(){
if(btnP)btnP.disabled=false;if(btnN)btnN.disabled=false;
updatePager();
});
}

function dlFile(name,type){
var disp=name.split('/').pop();
authFetch('/api/download?name='+encodeURIComponent(name).replace(/%2F/g,'/')+'&type='+type).then(function(r){
if(!r.ok)throw new Error('download failed: '+r.status);
return r.blob();
}).then(function(blob){
var url=URL.createObjectURL(blob);
var a=document.createElement('a');
a.href=url;a.download=disp;
document.body.appendChild(a);a.click();document.body.removeChild(a);
setTimeout(function(){URL.revokeObjectURL(url)},1000);
}).catch(function(e){showToast('下载失败',true);console.error(e)});
}

function delFile(name,type){
var btn=event&&event.target;
requireAuth(function(){
var disp=name.split('/').pop();
if(!confirm('确定删除 '+disp+'?'))return;
if(btn)btn.disabled=true;
authFetch('/api/files?name='+encodeURIComponent(name).replace(/%2F/g,'/')+'&type='+type,{method:'DELETE'}).then(function(r){return r.json()}).then(function(d){
if(d&&d.ok){showToast('已删除');goPage(curPage)}
else showToast('删除失败: '+(d.error||'未知错误'),true);
}).catch(function(e){showToast('删除失败',true);console.error(e)}).finally(function(){if(btn)btn.disabled=false});
});
}

window.onload=function(){goPage(1)};
</script>
</body>
</html>
