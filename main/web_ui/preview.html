<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mi&amp;Bee CAM 实时预览</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--c:#0D9488;--cd:#0F766E;--bg:#F8FAFB;--card:#fff;--t:#1E293B;--t2:#64748B;--bdr:#E2E8F0}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;background:var(--bg);color:var(--t);font-size:14px}
.hdr{background:linear-gradient(135deg,#0F766E,#0D9488);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px}
.hdr h1{font-size:17px;font-weight:700}
.hdr .sub{font-size:12px;opacity:.75;margin-left:auto}
.nav{background:var(--card);border-bottom:1px solid var(--bdr);display:flex}
.nav a{flex:1;text-align:center;padding:10px 0;font-size:13px;color:var(--t2);text-decoration:none;border-bottom:2px solid transparent;transition:all .15s}
.nav a.act{color:var(--c);border-bottom-color:var(--c);font-weight:600}
.nav a:hover{background:#F1F5F9}
.main{padding:12px;max-width:860px;margin:0 auto;padding-bottom:20px}
.stream-card{background:#000;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.15);position:relative}
#stream{width:100%;display:block;background:#000;min-height:200px}
.ph{display:flex;flex-direction:column;align-items:center;justify-content:center;color:#666;min-height:300px;font-size:15px}
.ph .sp{width:32px;height:32px;border:3px solid #333;border-top-color:var(--c);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.ctrl{background:var(--card);border-radius:10px;padding:12px 16px;margin-top:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.ctrl-left{display:flex;align-items:center;gap:12px;font-size:13px}
.ctrl-item{display:flex;align-items:center;gap:4px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot.g{background:#059669}
.dot.r{background:#DC2626;animation:pls 1s infinite}
.dot.y{background:#D97706;animation:pls .8s infinite}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.3}}
.cl{color:var(--t2);font-size:12px}
.cv{font-weight:600;font-size:13px}
.ctrl-right{display:flex;align-items:center;gap:8px}
select,button{font-family:inherit}
.sel{padding:6px 10px;border:1px solid var(--bdr);border-radius:6px;font-size:13px;background:var(--card);color:var(--t);cursor:pointer}
.btn{padding:7px 16px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-cap{background:var(--c);color:#fff}
.btn-cap:hover{background:var(--cd)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.range-row{display:flex;align-items:center;gap:8px;font-size:12px}
.range-row input[type="range"]{width:80px}
.range-val{min-width:28px;font-weight:600;color:var(--c)}
#stream:fullscreen,#stream:-webkit-full-screen{max-height:100vh;object-fit:contain}
.btn-rec{background:#DC2626;color:#fff}
.btn-rec:hover{background:#B91C1C}
.btn-rec.active{background:#059669}
.btn-rec.active:hover{background:#047857}
.btn-flash{background:#6B7280;color:#fff}
.btn-flash:hover{background:#4B5563}
.btn-flash.active{background:#F59E0B}
.btn-flash.active:hover{background:#D97706}

</style>
</head>
<body>
<div class="hdr">
<h1>Mi&amp;Bee CAM</h1>
<span class="sub">实时预览</span>
</div>
<div class="nav">
<a href="/">仪表盘</a>
<a href="/preview.html" class="act">实时预览</a>
<a href="/config.html">配置</a>
<a href="/files.html">照片</a>
</div>
<div class="main">
<div class="stream-card">
<div class="ph" id="placeholder">
<div class="sp"></div>
正在连接摄像头...
</div>
<img id="stream" style="display:none" alt="实时画面">
</div>
<div class="ctrl">
<div class="ctrl-left">
<div class="ctrl-item"><span class="dot y" id="sDot"></span><span class="cv" id="sTxt">连接中</span></div>
<div class="ctrl-item"><span class="cl">帧率:</span><span class="cv" id="fps">--</span></div>
<div class="ctrl-item"><span class="cl">客户端:</span><span class="cv" id="clients">--</span></div>
</div>
<div class="ctrl-right">
<button class="btn btn-rec" id="recBtn" onclick="toggleRec()">开始录像</button>

<select class="sel" id="resSel" onchange="changeRes()">
<option value="0">VGA (640x480)</option>
<option value="1">SVGA (800x600)</option>
<option value="2">XGA (1024x768)</option>
<option value="3">UXGA (1600x1200)</option>
</select>
<div class="range-row">
<span>质量</span>
<input type="range" id="qSlider" min="1" max="63" value="10" onchange="changeQuality()">
<span class="range-val" id="qVal">10</span>
</div>
      <button class="btn btn-flash" id="flashBtn" onclick="toggleFlash()">闪光灯</button>
<button class="btn btn-cap" onclick="capture()">拍照</button>
</div>
</div>
</div>
<script>
var img=document.getElementById('stream');
var ph=document.getElementById('placeholder');
var sDot=document.getElementById('sDot');
var sTxt=document.getElementById('sTxt');
var fpsEl=document.getElementById('fps');
var clientsEl=document.getElementById('clients');
var connected=false;
var retryT=null;
var capturing=false;
var snapshotMode=false;
var snapshotTimer=null;
var recoveryTimer=null;
var streamFailCount=0;
var STREAM_FAIL_THRESH=2;
var SNAPSHOT_INTERVAL=1500;
var RECOVERY_INTERVAL=30000;

var fetchWithTimeout=function(url,opts,ms){
  opts=opts||{};ms=ms||8000;
  var ctrl=new AbortController();
  var to=setTimeout(function(){ctrl.abort()},ms);
  opts.signal=ctrl.signal;
  return fetch(url,opts).then(function(r){clearTimeout(to);return r},function(e){clearTimeout(to);throw e});
};

function onConn(){
  connected=true;clearTimeout(retryT);
  streamFailCount=0;
  if(snapshotMode){
    snapshotMode=false;
    clearInterval(snapshotTimer);snapshotTimer=null;
    clearInterval(recoveryTimer);recoveryTimer=null;
  }
  ph.style.display='none';img.style.display='block';
  sDot.className='dot g';sTxt.textContent='已连接';sTxt.style.color='#059669';
  fpsEl.textContent='实时';fpsEl.style.color='#059669';
}

function startSnapshotMode(){
  snapshotMode=true;
  clearTimeout(retryT);
  connected=false;
  sDot.className='dot y';sTxt.textContent='截图模式';sTxt.style.color='#D97706';
  fpsEl.textContent='~1fps';fpsEl.style.color='#D97706';
  fetchSnapshot();
  snapshotTimer=setInterval(fetchSnapshot,SNAPSHOT_INTERVAL);
  recoveryTimer=setInterval(tryStreamRecovery,RECOVERY_INTERVAL);
}

function fetchSnapshot(){
  fetchWithTimeout('/capture',{},5000).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.blob();
  }).then(function(b){
    ph.style.display='none';img.style.display='block';
    if(img.src&&img.src.indexOf('blob:')===0)URL.revokeObjectURL(img.src);
    img.src=URL.createObjectURL(b);
  }).catch(function(){});
}

function tryStreamRecovery(){
  if(!snapshotMode)return;
  clearInterval(snapshotTimer);snapshotTimer=null;
  clearInterval(recoveryTimer);recoveryTimer=null;
  snapshotMode=false;streamFailCount=0;
  sDot.className='dot y';sTxt.textContent='恢复实时...';sTxt.style.color='#D97706';
  img.src='/stream?t='+Date.now();
}

function onStreamError(){
  connected=false;
  streamFailCount++;
  if(streamFailCount>=STREAM_FAIL_THRESH){
    startSnapshotMode();
    return;
  }
  sDot.className='dot r';sTxt.textContent='连接断开';sTxt.style.color='#DC2626';
  fpsEl.textContent='--';fpsEl.style.color='';
  if(retryT)clearTimeout(retryT);
  retryT=setTimeout(function(){
    sDot.className='dot y';sTxt.textContent='重新连接中';sTxt.style.color='#D97706';
    img.src='/stream?t='+Date.now();
  },3000);
}

img.onload=function(){if(!snapshotMode)onConn()};
img.onerror=function(){if(!snapshotMode)onStreamError()};
img.src='/stream';

// Status polling — only update client count, do NOT trigger reconnect from here
// (let img.onerror handle reconnection to avoid duplicate stream connections)
setInterval(function(){
fetchWithTimeout('/api/status',{},5000).then(function(r){return r.json()}).then(function(d){
if(d&&d.data){
var sc=d.data.stream_clients!=null?d.data.stream_clients:'--';
clientsEl.textContent=sc;
if(sc>0&&connected){fpsEl.textContent='实时';fpsEl.style.color='#059669'}
}
}).catch(function(){});
},10000);

function changeRes(){
  var sel=document.getElementById('resSel');
  var slider=document.getElementById('qSlider');
  var v=sel.value;
  var pt=sTxt.textContent,pc=sTxt.style.color;
  sel.disabled=true;slider.disabled=true;
  sTxt.textContent='切换中...';sTxt.style.color='#D97706';
  var h={'Content-Type':'application/json'};
  var pw=localStorage.getItem('cam_password')||'';
  if(pw)h['X-Password']=pw;
  fetchWithTimeout('/api/config',{method:'POST',headers:h,body:JSON.stringify({resolution:parseInt(v)})})
    .then(function(r){if(r.status===401){localStorage.setItem('cam_password','');var p=prompt('请输入管理密码 (默认: admin):');if(p){localStorage.setItem('cam_password',p);changeRes()}}})
    .catch(function(){alert('切换失败')})
    .finally(function(){sel.disabled=false;slider.disabled=false;sTxt.textContent=pt;sTxt.style.color=pc});
}
function changeQuality(){
  var sel=document.getElementById('resSel');
  var slider=document.getElementById('qSlider');
  var v=slider.value;
  document.getElementById('qVal').textContent=v;
  var pt=sTxt.textContent,pc=sTxt.style.color;
  sel.disabled=true;slider.disabled=true;
  sTxt.textContent='切换中...';sTxt.style.color='#D97706';
  var h={'Content-Type':'application/json'};
  var pw=localStorage.getItem('cam_password')||'';
  if(pw)h['X-Password']=pw;
  fetchWithTimeout('/api/config',{method:'POST',headers:h,body:JSON.stringify({jpeg_quality:parseInt(v)})})
    .then(function(r){if(r.status===401){localStorage.setItem('cam_password','');var p=prompt('请输入管理密码 (默认: admin):');if(p){localStorage.setItem('cam_password',p);changeQuality()}}})
    .catch(function(){alert('切换失败')})
    .finally(function(){sel.disabled=false;slider.disabled=false;sTxt.textContent=pt;sTxt.style.color=pc});
}
function capture(){
if(capturing)return;
capturing=true;
var btn=document.querySelector('.btn-cap');
if(btn)btn.disabled=true;
fetchWithTimeout('/capture').then(function(r){
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.blob();
}).then(function(b){
  var url=URL.createObjectURL(b);
  var a=document.createElement('a');
  a.href=url;
  a.download='capture_'+Date.now()+'.jpg';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  // Delay revocation so browser can finish reading the blob
  setTimeout(function(){URL.revokeObjectURL(url)},1000);
}).catch(function(){alert('拍照失败')})
.finally(function(){capturing=false;if(btn)btn.disabled=false});
}
function stopStream(){
  if(retryT)clearTimeout(retryT);
  if(snapshotTimer)clearInterval(snapshotTimer);
  if(recoveryTimer)clearInterval(recoveryTimer);
  snapshotTimer=null;recoveryTimer=null;
  img.onload=null;img.onerror=null;
  img.src='data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
  connected=false;
}
document.querySelectorAll('.nav a').forEach(function(a){
a.addEventListener('click',function(e){e.preventDefault();stopStream();setTimeout(function(){location.href=a.href},200)});
});
window.addEventListener('beforeunload',stopStream);
window.addEventListener('pagehide',stopStream);
// Load current resolution/quality from config
fetchWithTimeout('/api/config').then(function(r){return r.json()}).then(function(d){
if(d&&d.ok&&d.data){
var c=d.data;
if(c.resolution!=null)document.getElementById('resSel').value=c.resolution;
if(c.jpeg_quality!=null){
document.getElementById('qSlider').value=c.jpeg_quality;
document.getElementById('qVal').textContent=c.jpeg_quality;
}
}
}).catch(function(){});

var recording=false;
function toggleRec(){
var pw=localStorage.getItem('cam_password')||'';
var h={'Content-Type':'application/json'};
if(pw)h['X-Password']=pw;
var btn=document.getElementById('recBtn');
var action=recording?'stop':'start';
btn.disabled=true;
fetchWithTimeout('/api/record?action='+action,{method:'POST',headers:h}).then(function(r){return r.json()}).then(function(d){
if(d&&d.ok){
recording=!recording;
btn.textContent=recording?'停止录像':'开始录像';
btn.className=recording?'btn btn-rec active':'btn btn-rec';
}else{
alert('操作失败: '+(d&&d.error||'未知错误'));
}
}).catch(function(e){alert('请求失败')}).finally(function(){btn.disabled=false});
}
function toggleFlash(){
  var btn=document.getElementById('flashBtn');
  var h={};
  var pw=localStorage.getItem('cam_password')||'';
  if(pw)h['X-Password']=pw;
  btn.disabled=true;
  fetchWithTimeout('/api/flash',{method:'POST',headers:h})
    .then(function(r){
      if(r.status===401){localStorage.setItem('cam_password','');var p=prompt('请输入管理密码 (默认: admin):');if(p){localStorage.setItem('cam_password',p);toggleFlash()}return null}
      return r.json();
    })
    .then(function(d){
      if(d&&d.data&&d.data.on!=null){
        var on=d.data.on;
        btn.textContent=on?'关闭闪光':'闪光灯';
        btn.className=on?'btn btn-flash active':'btn btn-flash';
      }
    })
    .catch(function(){})
    .finally(function(){btn.disabled=false});
}
// Check recording state on load
fetchWithTimeout('/api/record').then(function(r){return r.json()}).then(function(d){
if(d&&d.ok&&d.data){
if(d.data.state==='RECORDING'){
recording=true;
var btn=document.getElementById('recBtn');
btn.textContent='停止录像';
btn.className='btn btn-rec active';
}
}
}).catch(function(){});
// Check flash LED state
fetchWithTimeout('/api/flash').then(function(r){return r.json()}).then(function(d){
  if(d&&d.data&&d.data.on){
    var btn=document.getElementById('flashBtn');
    btn.textContent='关闭闪光';
    btn.className='btn btn-flash active';
  }
}).catch(function(){});
</script>
</body>
</html>
