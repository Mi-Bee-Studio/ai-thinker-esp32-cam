<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MiBee Cam Setup</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--c:#0D9488;--cd:#0F766E;--bg:#0F172A;--card:#1E293B;--t:#F1F5F9;--t2:#94A3B8;--bdr:#334155;--red:#DC2626;--yel:#D97706;--grn:#059669}
body{font-family:-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--t);font-size:14px;min-height:100vh;display:flex;flex-direction:column}
/* Header */
.hdr{background:linear-gradient(135deg,#0F766E,#0D9488);color:#fff;padding:16px 20px;text-align:center}
.hdr h1{font-size:20px;font-weight:700;letter-spacing:.3px}
.hdr p{font-size:12px;opacity:.8;margin-top:2px}
/* Steps indicator */
.steps{display:flex;justify-content:center;gap:8px;padding:16px 0}
.step-d{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;background:var(--bdr);color:var(--t2);transition:all .3s}
.step-d.active{background:var(--c);color:#fff;box-shadow:0 2px 10px rgba(13,148,136,.4)}
.step-d.done{background:var(--c);color:#fff;opacity:.6}
.step-l{width:28px;height:2px;background:var(--bdr);align-self:center;transition:background .3s}
.step-l.done{background:var(--c)}
/* Main area */
.main{flex:1;padding:0 16px 20px;max-width:440px;width:100%;margin:0 auto}
/* Cards */
.card{background:var(--card);border-radius:12px;padding:18px;margin-bottom:14px;border:1px solid var(--bdr)}
.ct{font-size:15px;color:var(--c);font-weight:700;margin-bottom:14px}
/* Fields */
.fld{margin-bottom:12px}
.fld:last-child{margin-bottom:0}
.fld label{display:block;font-size:13px;color:var(--t2);margin-bottom:4px;font-weight:500}
.fld input[type="text"],.fld input[type="password"],.fld select{width:100%;padding:10px 12px;border:1px solid var(--bdr);border-radius:8px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--t);transition:border-color .2s}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--c);box-shadow:0 0 0 3px rgba(13,148,136,.15)}
.fld .hint{font-size:11px;color:var(--t2);margin-top:3px;opacity:.7}
/* Password toggle */
.pw-w{position:relative}
.pw-w input{padding-right:36px}
.pw-w .eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);cursor:pointer;user-select:none;font-size:15px;color:var(--t2);line-height:1}
/* WiFi list */
.wifi-list{max-height:260px;overflow-y:auto;border:1px solid var(--bdr);border-radius:8px}
.wifi-item{display:flex;align-items:center;padding:10px 12px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--bdr)}
.wifi-item:last-child{border-bottom:none}
.wifi-item:hover{background:rgba(13,148,136,.08)}
.wifi-item.selected{background:rgba(13,148,136,.15);border-left:3px solid var(--c)}
.wifi-item .lock{font-size:13px;margin-right:8px;color:var(--t2);width:16px;text-align:center}
.wifi-item .ssid{flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wifi-item .rssi{font-size:12px;color:var(--t2);min-width:40px;text-align:right}
.wifi-item .rssi strong{color:var(--c)}
.scan-bar{margin:8px 0}
/* Buttons */
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn{flex:1;padding:11px 16px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-p{background:var(--c);color:#fff}
.btn-p:hover:not(:disabled){background:var(--cd)}
.btn-s{background:var(--bdr);color:var(--t2)}
.btn-s:hover:not(:disabled){background:#475569}
.btn-scan{background:transparent;border:1px solid var(--c);color:var(--c);padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;transition:all .15s}
.btn-scan:hover:not(:disabled){background:rgba(13,148,136,.1)}
/* Step content */
.step-c{display:none;animation:fadeIn .25s ease}
.step-c.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* Success */
.ok-icon{text-align:center;margin:20px 0}
.ok-icon span{font-size:44px;display:inline-block;background:rgba(13,148,136,.12);width:76px;height:76px;line-height:76px;border-radius:50%;color:var(--c)}
.ok-msg{text-align:center;font-size:16px;color:var(--t);margin-bottom:6px;font-weight:600}
.ok-sub{text-align:center;font-size:13px;color:var(--t2);margin-bottom:20px}
/* Loading */
.ld{text-align:center;padding:16px 0;color:var(--t2);font-size:13px}
.ld span{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
/* Toast */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:8px;font-size:14px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;font-weight:500;white-space:nowrap}
.toast.show{opacity:1}
.toast.ok{background:var(--c);color:#fff}
.toast.err{background:var(--red);color:#fff}
/* Scan info */
.scan-info{text-align:center;padding:12px 0;color:var(--t2);font-size:13px}
.scan-count{font-weight:600;color:var(--c)}
/* Scrollbar */
.wifi-list::-webkit-scrollbar{width:4px}
.wifi-list::-webkit-scrollbar-track{background:var(--bg)}
.wifi-list::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
/* Signal bars visual */
.signal{display:inline-block;margin-right:2px;vertical-align:middle}
.signal .bar{width:3px;display:inline-block;margin-right:1px;background:var(--bdr);border-radius:1px;vertical-align:bottom}
.signal .bar.on{background:var(--c)}
</style>
</head>
<body>
<div class="hdr">
<h1>MiBee Cam</h1>
<p>First-Time Setup Wizard</p>
</div>

<!-- Step Indicator -->
<div class="steps" id="stepInd">
<div class="step-d active" data-s="1">1</div>
<div class="step-l"></div>
<div class="step-d" data-s="2">2</div>
<div class="step-l"></div>
<div class="step-d" data-s="3">3</div>
</div>

<div class="main">

<!-- Step 1: Scan & Select WiFi -->
<div class="card">
<div class="step-c active" data-s="1">
<div class="ct">Scan WiFi Networks</div>
<button class="btn-scan" id="scanBtn" onclick="scanWifi()">&#128268; Scan for Networks</button>
<div id="scanResult"></div>
<div id="scanList" style="display:none">
<div class="scan-info" id="scanInfo"></div>
<div class="wifi-list" id="wifiList"></div>
</div>
<div id="noNetworks" style="display:none">
<div class="scan-info">No networks found. <button class="btn-scan" onclick="scanWifi()" style="margin-top:8px;padding:8px 16px;font-size:13px">Rescan</button></div>
</div>
<div class="fld" style="margin-top:14px">
<label>Or enter SSID manually</label>
<input type="text" id="manualSsid" placeholder="WiFi network name">
</div>
<div class="btn-row">
<button class="btn btn-s" disabled style="visibility:hidden">Back</button>
<button class="btn btn-p" onclick="goStep2()">Next</button>
</div>
</div>

<!-- Step 2: Configure -->
<div class="step-c" data-s="2">
<div class="ct">WiFi Configuration</div>
<div class="fld">
<label>Selected Network</label>
<input type="text" id="cfgSsid" readonly style="opacity:.7">
</div>
<div class="fld">
<label>Password</label>
<div class="pw-w">
<input type="password" id="cfgPass" placeholder="WiFi password" autocomplete="off">
<span class="eye" onclick="togPw(this)">&#128065;</span>
</div>
<div class="hint">Leave blank for open networks</div>
</div>
<div class="fld">
<label>Device Name</label>
<input type="text" id="cfgName" placeholder="MiBeeCam">
<div class="hint">How this device appears on your network</div>
</div>
<div class="fld">
<label>Timezone</label>
<select id="cfgTz">
<option value="CST-8">China (UTC+8)</option>
<option value="EST5EDT">Eastern (UTC-5)</option>
<option value="CST6CDT">Central (UTC-6)</option>
<option value="MST7MDT">Mountain (UTC-7)</option>
<option value="PST8PDT">Pacific (UTC-8)</option>
<option value="GMT0">GMT (UTC+0)</option>
<option value="CET-1CEST-2,M3.5.0,M10.5.0/3">Central European (UTC+1/+2)</option>
<option value="JST-9">Japan (UTC+9)</option>
<option value="KST-9">Korea (UTC+9)</option>
<option value="GMT-3">Brazil (UTC-3)</option>
<option value="AEST-10">Australia East (UTC+10)</option>
<option value="NZST-12NZDT-13,M9.4.0,M4.1.0/3">New Zealand (UTC+12/+13)</option>
</select>
</div>
<div class="btn-row">
<button class="btn btn-s" onclick="goStep(1)">Back</button>
<button class="btn btn-p" onclick="goStep3()">Connect</button>
</div>
</div>

<!-- Step 3: Save & Reboot -->
<div class="step-c" data-s="3">
<div class="ok-icon"><span>&#10003;</span></div>
<div class="ok-msg">Saving Configuration</div>
<div class="ok-sub" id="okSub">Connecting your device to WiFi...</div>
<div class="ld"><span>&#9889;</span> Applying settings, please wait...</div>
</div>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
function $(s){return document.getElementById(s)}
var tT=null;
function showToast(m,e){
 var t=$('toast');
 t.textContent=m;
 t.className='toast show '+(e?'err':'ok');
 clearTimeout(tT);
 tT=setTimeout(function(){t.className='toast'},3000);
}
var currentStep=1;
var totalSteps=3;
var selectedSsid='';

function togPw(el){
 var i=el.previousElementSibling;
 if(i.type==='password'){i.type='text';el.textContent='\uD83D\uDC41'}
 else{i.type='password';el.textContent='\uD83D\uDC40'}
}

function updateSteps(){
 for(var i=1;i<=totalSteps;i++){
  var s=document.querySelector('.step-d[data-s="'+i+'"]');
  var line=s?s.nextElementSibling:null;
  if(!s)continue;
  s.classList.remove('active','done');
  if(i<currentStep)s.classList.add('done');
  else if(i===currentStep)s.classList.add('active');
  if(line&&line.classList&&i<currentStep)line.classList.add('done');
  else if(line&&line.classList)line.classList.remove('done');
 }
 for(var i=1;i<=totalSteps;i++){
  var c=document.querySelector('.step-c[data-s="'+i+'"]');
  if(c)c.classList.toggle('active',i===currentStep);
 }
}

function goStep(n){currentStep=n;updateSteps()}

function goStep2(){
 var manual=$('manualSsid').value.trim();
 var fromScan=selectedSsid;
 var ssid=fromScan||manual;
 if(!ssid){showToast('Please select or enter a WiFi network','err');return}
 $('cfgSsid').value=ssid;
 $('cfgName').value=$('cfgName').value||'MiBeeCam';
 goStep(2);
}

function goStep3(){
 var ssid=$('cfgSsid').value.trim();
 if(!ssid){showToast('No network selected','err');goStep(1);return}
 goStep(3);
 saveConfig();
}

function signalBars(rssi){
 var level=0;
 if(rssi>-55)level=4;
 else if(rssi>-70)level=3;
 else if(rssi>-80)level=2;
 else level=1;
 var h=[8,12,16,20];
 var html='<span class="signal">';
 for(var i=0;i<4;i++){
  html+='<span class="bar '+(i<level?'on':'')+'" style="height:'+h[i]+'px"></span>';
 }
 html+='</span> <strong>'+rssi+'dBm</strong>';
 return html;
}

function scanWifi(){
 var btn=$('scanBtn');
 btn.disabled=true;
 btn.textContent='Scanning...';
 $('scanResult').style.display='none';
 $('scanList').style.display='none';
 $('noNetworks').style.display='none';
 selectedSsid='';

 fetch('/api/scan').then(function(r){return r.json()}).then(function(d){
  btn.disabled=false;
  btn.textContent='\uD83D\uDD0D Scan for Networks';
  var nets=d.networks||d.data||d;
  if(!Array.isArray(nets))nets=[];
  nets.sort(function(a,b){return(b.rssi||0)-(a.rssi||0)});
  if(nets.length===0){
   $('noNetworks').style.display='block';
   return;
  }
  $('scanInfo').innerHTML='Found <span class="scan-count">'+nets.length+'</span> networks';
  var list=$('wifiList');
  list.innerHTML='';
  nets.forEach(function(n){
   var auth=n.auth||n.secure;
   var lockIcon=auth?'\uD83D\uDD12':'\uD83D\uDD13';
   var item=document.createElement('div');
   item.className='wifi-item';
   item.innerHTML='<span class="lock">'+lockIcon+'</span><span class="ssid">'+(n.ssid||'Hidden')+'</span><span class="rssi">'+signalBars(n.rssi)+'</span>';
   item.onclick=function(){
    selectedSsid=n.ssid||'';
    $('manualSsid').value='';
    document.querySelectorAll('.wifi-item').forEach(function(el){el.classList.remove('selected')});
    this.classList.add('selected');
   };
   list.appendChild(item);
  });
  $('scanList').style.display='block';
 }).catch(function(e){
  btn.disabled=false;
  btn.textContent='\uD83D\uDD0D Scan for Networks';
  showToast('Scan failed — try entering SSID manually','err');
  console.error('Scan failed:',e);
 });
}

function saveConfig(){
 var cfg={
  wifi_ssid:$('cfgSsid').value.trim(),
  wifi_pass:$('cfgPass').value,
  device_name:$('cfgName').value.trim()||'MiBeeCam',
  timezone:$('cfgTz').value
 };
 fetch('/api/config',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify(cfg)
 }).then(function(r){return r.json()}).then(function(d){
  if(d&&d.ok){
   $('okSub').textContent='Configuration saved! Rebooting...';
   showToast('Configuration saved');
   setTimeout(function(){window.location.href='/'},3000);
  }else{
   showToast('Save failed: '+(d.error||'Unknown error'),'err');
   $('okSub').textContent='Failed to save. Retrying...';
   currentStep=2;updateSteps();
  }
 }).catch(function(e){
  showToast('Connection lost — device may be rebooting','err');
  $('okSub').textContent='Device is rebooting. Redirecting...';
  setTimeout(function(){window.location.href='/'},5000);
 });
}

/* Auto-scan on load */
window.onload=function(){
 var cfg=$('cfgName').value;
 if(!cfg)$('cfgName').value='MiBeeCam';
};
</script>
</body>
</html>
